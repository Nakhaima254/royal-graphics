name: Deploy to cPanel (SFTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.CPANEL_USERNAME }}
          server: ${{ secrets.CPANEL_SERVER }}
          password: ${{ secrets.CPANEL_PASSWORD }}
          port: 21098 # Critical for HostPinnacle
          local_path: './dist/*'
          # Matches your royalgraphics folder path
          remote_path: '/home1/jahaziso/royalgraphics.co.ke'
          sftp_only: true
